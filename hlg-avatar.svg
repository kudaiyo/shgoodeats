<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Blue-purple background -->
  <rect width="400" height="400" rx="28" fill="#7B9DD4"/>

  <!-- ===== MAIN DRAGON FRUIT BODY ===== -->
  <path d="
    M 62 395
    C 48 358 50 298 58 248
    C 62 218 60 190 70 168
    C 74 150 70 120 82 92
    C 90 70 108 56 118 80
    C 126 100 122 134 124 160
    C 126 177 136 184 150 180
    C 159 176 162 163 164 150
    C 167 127 175 86 187 53
    C 193 30 200 16 200 16
    C 200 16 207 30 213 53
    C 225 86 233 127 236 150
    C 238 163 241 176 250 180
    C 264 184 274 177 276 160
    C 278 134 274 100 282 80
    C 292 56 310 70 318 92
    C 330 120 326 150 330 168
    C 340 190 338 218 342 248
    C 350 298 352 358 338 395
    C 300 410 260 414 200 414
    C 140 414 100 410 62 395
    Z
  " fill="#FF8EC7" stroke="#1a0a0a" stroke-width="7.5" stroke-linejoin="round"/>

  <!-- ===== GREEN TIPS ON EACH SPIKE ===== -->
  <!-- Left outer spike -->
  <path d="M 86 148 C 90 112 100 80 118 80 C 126 100 120 138 118 158 Z"
        fill="#7EE87E" stroke="#1a0a0a" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- Left-center spike -->
  <path d="M 166 138 C 170 108 177 78 187 53 C 196 70 193 105 190 132 Z"
        fill="#7EE87E" stroke="#1a0a0a" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- Center spike (tallest) -->
  <path d="M 187 82 C 193 50 200 16 200 16 C 207 50 213 82 213 82 C 207 68 200 62 193 68 Z"
        fill="#7EE87E" stroke="#1a0a0a" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- Right-center spike -->
  <path d="M 210 132 C 207 105 204 70 213 53 C 223 78 230 108 234 138 Z"
        fill="#7EE87E" stroke="#1a0a0a" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- Right outer spike -->
  <path d="M 282 158 C 280 138 274 100 282 80 C 300 80 310 112 314 148 Z"
        fill="#7EE87E" stroke="#1a0a0a" stroke-width="3.5" stroke-linejoin="round"/>

  <!-- Scale curve marks on pink body (like the eyebrow-like lines in reference) -->
  <path d="M 163 195 Q 175 180 190 190" fill="none" stroke="#D4609A" stroke-width="4" stroke-linecap="round"/>
  <path d="M 210 190 Q 225 180 237 195" fill="none" stroke="#D4609A" stroke-width="4" stroke-linecap="round"/>

  <!-- ===== FACE ===== -->
  <!-- Cream-peach face oval -->
  <circle cx="200" cy="300" r="108" fill="#FFF2E8" stroke="#1a0a0a" stroke-width="6.5"/>

  <!-- Brown hair at top of face -->
  <path d="M 110 280 Q 128 222 200 218 Q 272 222 290 280"
        fill="#8B6040" stroke="#1a0a0a" stroke-width="4.5" stroke-linejoin="round"/>
  <!-- Hair strand lines -->
  <line x1="186" y1="219" x2="192" y2="262" stroke="#5C3820" stroke-width="2.8" stroke-linecap="round"/>
  <line x1="200" y1="217" x2="200" y2="263" stroke="#5C3820" stroke-width="2.8" stroke-linecap="round"/>
  <line x1="214" y1="219" x2="208" y2="262" stroke="#5C3820" stroke-width="2.8" stroke-linecap="round"/>

  <!-- ===== HUGE CHIBI EYES ===== -->
  <!-- Left eye white -->
  <circle cx="164" cy="300" r="40" fill="white" stroke="#1a0a0a" stroke-width="5.5"/>
  <!-- Right eye white -->
  <circle cx="236" cy="300" r="40" fill="white" stroke="#1a0a0a" stroke-width="5.5"/>
  <!-- Left pupil -->
  <circle cx="169" cy="306" r="12" fill="#1a0a0a"/>
  <!-- Right pupil -->
  <circle cx="241" cy="306" r="12" fill="#1a0a0a"/>
  <!-- Eye shines -->
  <circle cx="157" cy="291" r="6.5" fill="white"/>
  <circle cx="229" cy="291" r="6.5" fill="white"/>

  <!-- ===== BLUSH ===== -->
  <ellipse cx="118" cy="334" rx="23" ry="13" fill="#FFB0C8" opacity="0.82"/>
  <ellipse cx="282" cy="334" rx="23" ry="13" fill="#FFB0C8" opacity="0.82"/>
  <!-- Blush tick marks left -->
  <line x1="106" y1="329" x2="106" y2="339" stroke="#E8607A" stroke-width="2.8" stroke-linecap="round"/>
  <line x1="116" y1="326" x2="116" y2="336" stroke="#E8607A" stroke-width="2.8" stroke-linecap="round"/>
  <line x1="126" y1="329" x2="126" y2="339" stroke="#E8607A" stroke-width="2.8" stroke-linecap="round"/>
  <!-- Blush tick marks right -->
  <line x1="270" y1="329" x2="270" y2="339" stroke="#E8607A" stroke-width="2.8" stroke-linecap="round"/>
  <line x1="280" y1="326" x2="280" y2="336" stroke="#E8607A" stroke-width="2.8" stroke-linecap="round"/>
  <line x1="290" y1="329" x2="290" y2="339" stroke="#E8607A" stroke-width="2.8" stroke-linecap="round"/>

  <!-- Small cute smile -->
  <path d="M 188 344 Q 200 355 212 344" stroke="#1a0a0a" stroke-width="3.8" fill="none" stroke-linecap="round"/>
</svg>
